<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Results - Cosmetic Ingredient Detector</title>
    <link rel="stylesheet" href="/static/styles/main.css">
</head>
<body>
    <div class="background-gradient"></div>
    
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <span class="logo-icon">🧴</span>
                <span class="logo-text">Cosmetic Detector</span>
            </div>
            <div class="nav-actions">
                <button class="profile-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="container results-container">
        <div class="results-header">
            <h1>Analysis Results</h1>
            <div id="safetyBadgeContainer"></div>
        </div>

        <div class="glass-card results-section">
            <h2 class="section-title">
                <span>📄</span>
                Extracted Ingredients
            </h2>
            <div class="extracted-text-box" id="extractedText">
                Loading...
            </div>
        </div>

        <div class="glass-card results-section" id="harmfulSection">
            <h2 class="section-title">
                <span>⚠️</span>
                Harmful Ingredients Detected
            </h2>
            <div class="harmful-list" id="harmfulList"></div>
        </div>

        <div style="text-align: center;">
            <a href="/" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Scan Another Product
            </a>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const resultsData = urlParams.get('data');
        
        if (resultsData) {
            try {
                const data = JSON.parse(decodeURIComponent(resultsData));
                displayResults(data);
            } catch (e) {
                console.error('Error parsing results:', e);
                document.getElementById('extractedText').textContent = 'Error loading results';
            }
        } else {
            document.getElementById('extractedText').textContent = 'No results available';
        }

        function displayResults(data) {
            const safetyBadgeContainer = document.getElementById('safetyBadgeContainer');
            const extractedTextEl = document.getElementById('extractedText');
            const harmfulListEl = document.getElementById('harmfulList');
            const harmfulSectionEl = document.getElementById('harmfulSection');

            let safetyClass = 'badge-safe';
            if (data.safety_rating === 'CAUTION') {
                safetyClass = 'badge-caution';
            } else if (data.safety_rating === 'HARMFUL') {
                safetyClass = 'badge-harmful';
            }

            let vegIcon = '🌱';
            let vegText = 'Vegetarian';
            if (data.veg_status === 'NON_VEG') {
                vegIcon = '🥩';
                vegText = 'Non-Vegetarian';
            }

            safetyBadgeContainer.innerHTML = `
                <div class="safety-badge ${safetyClass}">${data.safety_rating}</div>
                <div class="veg-badge">
                    <span>${vegIcon}</span>
                    <span>${vegText}</span>
                </div>
            `;

            extractedTextEl.textContent = data.extracted_text || 'No text extracted';

            if (data.harmful_ingredients && data.harmful_ingredients.length > 0) {
                harmfulListEl.innerHTML = data.harmful_ingredients.map((item, index) => `
                    <div class="harmful-item" style="animation-delay: ${index * 0.1}s">
                        <div class="harmful-item-header">
                            <div class="harmful-icon">⚠️</div>
                            <div class="harmful-name">
                                <h3>${item.name}</h3>
                                <div class="category">${item.category}</div>
                            </div>
                        </div>
                        <ul class="reasons-list">
                            ${item.reasons.map(reason => `<li>${reason}</li>`).join('')}
                        </ul>
                    </div>
                `).join('');
            } else {
                harmfulSectionEl.style.display = 'none';
                
                const safeMessageEl = document.createElement('div');
                safeMessageEl.className = 'glass-card results-section';
                safeMessageEl.innerHTML = `
                    <div class="safe-message">
                        <div class="icon">✅</div>
                        <h3>Great News!</h3>
                        <p>No harmful ingredients detected in this product.</p>
                    </div>
                `;
                harmfulSectionEl.parentNode.insertBefore(safeMessageEl, harmfulSectionEl);
            }
        }
    </script>
</body>
</html>
